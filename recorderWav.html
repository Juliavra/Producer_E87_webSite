<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grabador WAV Pro (Sin Clics)</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: #1e1e1e; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; width: 450px; }
        h2 { margin-bottom: 1rem; color: #00d4ff; }
        canvas { width: 100%; height: 100px; background: #000; border-radius: 8px; margin-bottom: 20px; border: 1px solid #333; }
        .controls { display: flex; flex-direction: column; gap: 12px; }
        button { padding: 12px; font-size: 1rem; border: none; border-radius: 8px; cursor: pointer; transition: 0.3s; font-weight: bold; }
        #btnCapturar { background: #00d4ff; color: #121212; }
        #btnGrabar { background: #ff4b2b; color: white; display: none; }
        #btnDetener { background: #ffffff; color: #121212; display: none; }
        #btnDescargar { background: #28a745; color: white; display: none; margin-top: 10px; }
        #playerContainer { display: none; margin-top: 20px; padding: 15px; border-top: 1px solid #333; }
        audio { width: 100%; filter: invert(100%); margin-top: 10px; }
        .status { margin-top: 20px; font-size: 0.9rem; color: #aaa; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .recording-dot { width: 10px; height: 10px; background: red; border-radius: 50%; animation: blink 1s infinite; display: none; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        #waveformCanvas { cursor: pointer; border: 1px solid #00d4ff; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Grabador WAV Pro</h2>
        <canvas id="visualizer"></canvas>

        <div class="controls">
            <button id="btnCapturar">1. Vincular Audio</button>
            <button id="btnGrabar">2. Iniciar Grabación</button>
            <button id="btnDetener">3. Detener Grabación</button>
        </div>

        <div id="playerContainer">
            <p style="font-size: 0.8rem; color: #00d4ff; margin-bottom: 5px;">Forma de onda (clic para saltar):</p>
            <div style="position: relative;">
                <canvas id="waveformCanvas" width="450" height="80"></canvas>
                <div id="playbackCursor" style="position: absolute; top: 0; left: 0; width: 2px; height: 100%; background: white; pointer-events: none;"></div>
            </div>
            <audio id="audioPlayer" controls></audio>
            <button id="btnDescargar">Guardar Archivo .WAV</button>
        </div>

        <div class="status">
            <div id="dot" class="recording-dot"></div>
            <span id="textoEstado">Listo para comenzar</span>
        </div>
    </div>

<script>
    let audioContext, analyser, mediaRecorder;
    let webmChunks = [];
    let currentStream, finalBlobUrl;

    const canvas = document.getElementById('visualizer');
    const canvasCtx = canvas.getContext('2d');
    const wavCanvas = document.getElementById('waveformCanvas');
    const wavCtx = wavCanvas.getContext('2d');
    
    const btnCapturar = document.getElementById('btnCapturar');
    const btnGrabar = document.getElementById('btnGrabar');
    const btnDetener = document.getElementById('btnDetener');
    const btnDescargar = document.getElementById('btnDescargar');
    const audioPlayer = document.getElementById('audioPlayer');
    const playerContainer = document.getElementById('playerContainer');
    const textoEstado = document.getElementById('textoEstado');
    const dot = document.getElementById('dot');
    const cursor = document.getElementById('playbackCursor');

    // 1. VINCULAR AUDIO (MediaStream)
    btnCapturar.onclick = async () => {
        try {
            const stream = await navigator.mediaDevices.getDisplayMedia({ 
                video: true, 
                audio: { echoCancellation: false, noiseSuppression: false } 
            });
            const audioTracks = stream.getAudioTracks();
            if (audioTracks.length === 0) return alert("¡No seleccionaste 'Compartir audio'!");
            
            currentStream = new MediaStream(audioTracks);
            btnCapturar.style.display = 'none';
            btnGrabar.style.display = 'block';
            textoEstado.innerText = "Audio vinculado";
            iniciarVisualizador(currentStream);
        } catch (err) {
            textoEstado.innerText = "Error al vincular";
        }
    };

    // 2. VISUALIZADOR EN VIVO (Forma de onda)
    function iniciarVisualizador(stream) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const source = audioContext.createMediaStreamSource(stream);
        analyser = audioContext.createAnalyser();
        analyser.fftSize = 1024;
        source.connect(analyser);

        const bufferLength = analyser.frequencyBinCount;
        const dataArray = new Uint8Array(bufferLength);

        function draw() {
            requestAnimationFrame(draw);
            analyser.getByteTimeDomainData(dataArray);
            canvasCtx.fillStyle = '#1e1e1e';
            canvasCtx.fillRect(0, 0, canvas.width, canvas.height);
            canvasCtx.lineWidth = 2;
            canvasCtx.strokeStyle = '#00d4ff';
            canvasCtx.beginPath();
            let sliceWidth = canvas.width / bufferLength;
            let x = 0;
            for (let i = 0; i < bufferLength; i++) {
                let v = dataArray[i] / 128.0;
                let y = v * canvas.height / 2;
                i === 0 ? canvasCtx.moveTo(x, y) : canvasCtx.lineTo(x, y);
                x += sliceWidth;
            }
            canvasCtx.stroke();
        }
        draw();
    }

    // 3. GRABACIÓN (Usando MediaRecorder para evitar clics)
    btnGrabar.onclick = () => {
        webmChunks = [];
        mediaRecorder = new MediaRecorder(currentStream);
        
        mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) webmChunks.push(e.data); };
        
        mediaRecorder.onstop = async () => {
            textoEstado.innerText = "Procesando WAV...";
            const webmBlob = new Blob(webmChunks, { type: 'audio/webm' });
            const wavBlob = await convertirWebmAWav(webmBlob);
            
            finalBlobUrl = URL.createObjectURL(wavBlob);
            audioPlayer.src = finalBlobUrl;
            playerContainer.style.display = 'block';
            drawStaticWaveform(wavBlob);
            textoEstado.innerText = "Grabación finalizada";
        };

        mediaRecorder.start();
        btnGrabar.style.display = 'none';
        btnDetener.style.display = 'block';
        dot.style.display = 'block';
        textoEstado.innerText = "Grabando...";
    };

    btnDetener.onclick = () => {
        mediaRecorder.stop();
        dot.style.display = 'none';
        btnDetener.style.display = 'none';
        btnGrabar.style.display = 'block';
    };

    // 4. CONVERSIÓN INTERNA WEBM -> WAV
    async function convertirWebmAWav(webmBlob) {
        const arrayBuffer = await webmBlob.arrayBuffer();
        const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
        const left = audioBuffer.getChannelData(0);
        const right = audioBuffer.numberOfChannels > 1 ? audioBuffer.getChannelData(1) : left;
        return encodeWAV([{ left, right }], audioBuffer.sampleRate);
    }

    // 5. DIBUJAR ONDA ESTÁTICA E INTERACTIVA
    async function drawStaticWaveform(wavBlob) {
        const arrayBuffer = await wavBlob.arrayBuffer();
        const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
        const data = audioBuffer.getChannelData(0);
        const step = Math.ceil(data.length / wavCanvas.width);
        const amp = wavCanvas.height / 2;

        wavCtx.fillStyle = '#1e1e1e';
        wavCtx.fillRect(0, 0, wavCanvas.width, wavCanvas.height);
        wavCtx.beginPath();
        wavCtx.strokeStyle = '#00d4ff';
        for (let i = 0; i < wavCanvas.width; i++) {
            let min = 1, max = -1;
            for (let j = 0; j < step; j++) {
                const datum = data[(i * step) + j];
                if (datum < min) min = datum;
                if (datum > max) max = datum;
            }
            wavCtx.moveTo(i, (1 + min) * amp);
            wavCtx.lineTo(i, (1 + max) * amp);
        }
        wavCtx.stroke();
    }

    wavCanvas.onclick = (e) => {
        const x = e.offsetX;
        const percentage = x / wavCanvas.width;
        if (audioPlayer.duration) audioPlayer.currentTime = percentage * audioPlayer.duration;
        audioPlayer.play();
    };

    audioPlayer.ontimeupdate = () => {
        cursor.style.left = `${(audioPlayer.currentTime / audioPlayer.duration) * 100}%`;
    };

    // 6. ENCODER WAV (Optimizado)
    function encodeWAV(chunks, sampleRate) {
        let len = chunks[0].left.length;
        const buffer = new ArrayBuffer(44 + len * 4);
        const view = new DataView(buffer);
        const s = (off, str) => { for (let i = 0; i < str.length; i++) view.setUint8(off + i, str.charCodeAt(i)); };
        s(0, 'RIFF'); view.setUint32(4, 32 + len * 4, true); s(8, 'WAVE'); s(12, 'fmt ');
        view.setUint32(16, 16, true); view.setUint16(20, 1, true); view.setUint16(22, 2, true);
        view.setUint32(24, sampleRate, true); view.setUint32(28, sampleRate * 4, true);
        view.setUint16(32, 4, true); view.setUint16(34, 16, true); s(36, 'data');
        view.setUint32(40, len * 4, true);
        let offset = 44;
        for (let i = 0; i < len; i++) {
            view.setInt16(offset, Math.max(-1, Math.min(1, chunks[0].left[i])) * 0x7FFF, true);
            view.setInt16(offset + 2, Math.max(-1, Math.min(1, chunks[0].right[i])) * 0x7FFF, true);
            offset += 4;
        }
        return new Blob([buffer], { type: 'audio/wav' });
    }

    btnDescargar.onclick = () => {
        const a = document.createElement("a");
        a.href = finalBlobUrl;
        a.download = "grabacion_pro.wav";
        a.click();
    };
</script>
</body>
</html>
