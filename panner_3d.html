<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>3D Grid Drum Machine</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a0a; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .daw-container { background: #1a1a1a; padding: 20px; border-radius: 15px; box-shadow: 0 10px 50px rgba(0,0,0,0.8); width: 900px; border: 1px solid #333; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 15px; }
        
        /* Grilla de Instrumentos */
        .instrument-row { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; background: #222; padding: 10px; border-radius: 8px; }
        .label-area { width: 100px; font-weight: bold; color: #00d4ff; font-size: 0.8rem; }
        
        .steps-container { display: flex; gap: 5px; }
        .step-btn { width: 35px; height: 35px; background: #333; border: 1px solid #444; border-radius: 4px; cursor: pointer; transition: 0.2s; }
        .step-btn.active { background: #00ff88; box-shadow: 0 0 10px #00ff88; border-color: #fff; }
        .step-btn.playing { border: 2px solid white; }

        /* Controles Individuales */
        .indiv-controls { display: flex; gap: 10px; align-items: center; flex-grow: 1; margin-left: 20px; }
        .control-group { display: flex; flex-direction: column; width: 80px; }
        label { font-size: 0.6rem; color: #888; text-transform: uppercase; margin-bottom: 3px; }
        input[type="range"] { cursor: pointer; accent-color: #00d4ff; }

        /* Área 3D */
        .panner-grid { display: flex; justify-content: space-around; margin-top: 20px; padding-top: 20px; border-top: 1px solid #333; }
        .panner-box { width: 120px; height: 120px; background: #000; border: 1px solid #444; position: relative; border-radius: 50%; overflow: hidden; }
        .sound-dot { position: absolute; width: 10px; height: 10px; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; }
        
        #btnMaster { background: #00ff88; color: black; padding: 10px 20px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        #btnMaster.active { background: #ff4b2b; color: white; }
    </style>
</head>
<body>

<div class="daw-container">
    <div class="header">
        <div>
            <button id="btnMaster">ENCENDER MOTOR</button>
            <span id="tempoDisplay" style="margin-left: 15px; font-family: monospace;">120 BPM</span>
            <input type="range" id="masterBPM" min="60" max="180" value="120" style="width: 100px;">
        </div>
        <h2 style="margin: 0; font-size: 1.2rem; color: #888;">MATRIX 3D SEQUENCER</h2>
    </div>

    <!-- FILAS DE INSTRUMENTOS -->
    <div id="grid">
        <!-- Generado por JS -->
    </div>

    <!-- VISUALIZACIÓN ESPACIAL INDIVIDUAL -->
    <div class="panner-grid" id="pannerGrid">
        <!-- Generado por JS -->
    </div>
</div>

<script>
    let audioCtx, isPlaying = false, currentStep = 0, nextStepTime = 0;
    const tempoControl = document.getElementById('masterBPM');
    const instruments = [
        { name: 'KICK', color: '#00ff88', type: 'kick' },
        { name: 'SNARE', color: '#ffcc00', type: 'snare' },
        { name: 'HI-HAT', color: '#00d4ff', type: 'hihat' }
    ];

    const state = instruments.map(() => ({
        steps: Array(8).fill(false),
        volume: 0.7,
        posX: 0,
        posY: 0,
        node: null
    }));

    function initAudio() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        state.forEach((inst, i) => {
            inst.node = audioCtx.createPanner();
            inst.node.panningModel = 'HRTF';
            inst.node.connect(audioCtx.destination);
        });
    }

    // --- SÍNTESIS ---
    function playKick(time, panner, vol) {
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.frequency.setValueAtTime(150, time);
        osc.frequency.exponentialRampToValueAtTime(0.01, time + 0.4);
        g.gain.setValueAtTime(vol * 1.5, time);
        g.gain.exponentialRampToValueAtTime(0.01, time + 0.4);
        osc.connect(g); g.connect(panner);
        osc.start(time); osc.stop(time + 0.4);
    }

    function playSnare(time, panner, vol) {
        const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.1, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
        const n = audioCtx.createBufferSource(); n.buffer = buffer;
        const f = audioCtx.createBiquadFilter(); f.type = 'highpass'; f.frequency.value = 1500;
        const g = audioCtx.createGain(); g.gain.setValueAtTime(vol, time);
        g.gain.exponentialRampToValueAtTime(0.01, time + 0.1);
        n.connect(f); f.connect(g); g.connect(panner);
        n.start(time); n.stop(time + 0.1);
    }

    function playHiHat(time, panner, vol) {
        const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.05, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
        const n = audioCtx.createBufferSource(); n.buffer = buffer;
        const f = audioCtx.createBiquadFilter(); f.type = 'highpass'; f.frequency.value = 8000;
        const g = audioCtx.createGain(); g.gain.setValueAtTime(vol * 0.4, time);
        g.gain.exponentialRampToValueAtTime(0.01, time + 0.05);
        n.connect(f); f.connect(g); g.connect(panner);
        n.start(time); n.stop(time + 0.05);
    }

    // --- RENDERIZADO DE INTERFAZ ---
    const gridEl = document.getElementById('grid');
    const pannerGridEl = document.getElementById('pannerGrid');

    instruments.forEach((inst, i) => {
        // Fila
        const row = document.createElement('div');
        row.className = 'instrument-row';
        row.innerHTML = `
            <div class="label-area">${inst.name}</div>
            <div class="steps-container" id="steps-${i}"></div>
            <div class="indiv-controls">
                <div class="control-group">
                    <label>VOL</label>
                    <input type="range" min="0" max="1" step="0.1" value="0.7" oninput="state[${i}].volume = this.value">
                </div>
            </div>
        `;
        gridEl.appendChild(row);

        const stepsCont = document.getElementById(`steps-${i}`);
        for(let s=0; s<8; s++) {
            const btn = document.createElement('button');
            btn.className = 'step-btn';
            btn.onclick = () => {
                state[i].steps[s] = !state[i].steps[s];
                btn.classList.toggle('active');
            };
            stepsCont.appendChild(btn);
        }

        // Panner Box
        const pBox = document.createElement('div');
        pBox.className = 'panner-box';
        pBox.innerHTML = `<div class="sound-dot" id="dot-${i}" style="background:${inst.color}; left:50%; top:50%;"></div>`;
        pBox.onclick = (e) => {
            const rect = pBox.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const dot = document.getElementById(`dot-${i}`);
            dot.style.left = `${(x/rect.width)*100}%`;
            dot.style.top = `${(y/rect.height)*100}%`;
            
            if(state[i].node) {
                state[i].node.positionX.value = ((x/rect.width)*20)-10;
                state[i].node.positionY.value = (((y/rect.height)*20)-10)*-1;
            }
        };
        const pLabel = document.createElement('div');
        pLabel.style.textAlign = 'center';
        pLabel.innerHTML = `<p style="font-size:0.6rem; margin-top:5px;">PAN 3D ${inst.name}</p>`;
        const wrapper = document.createElement('div');
        wrapper.appendChild(pBox);
        wrapper.appendChild(pLabel);
        pannerGridEl.appendChild(wrapper);
    });

    // --- SCHEDULER ---
    function scheduler() {
        while (nextStepTime < audioCtx.currentTime + 0.1) {
            state.forEach((inst, i) => {
                if (inst.steps[currentStep]) {
                    if(i === 0) playKick(nextStepTime, inst.node, inst.volume);
                    if(i === 1) playSnare(nextStepTime, inst.node, inst.volume);
                    if(i === 2) playHiHat(nextStepTime, inst.node, inst.volume);
                }
            });
            nextNote();
        }
        if (isPlaying) requestAnimationFrame(scheduler);
    }

    function nextNote() {
        nextStepTime += (60.0 / tempoControl.value / 4);
        currentStep = (currentStep + 1) % 8;
        
        // Visualizar paso actual
        document.querySelectorAll('.step-btn').forEach((b, idx) => {
            b.classList.toggle('playing', (idx % 8) === currentStep);
        });
    }

    document.getElementById('btnMaster').onclick = (e) => {
        if (!audioCtx) initAudio();
        isPlaying = !isPlaying;
        if (isPlaying) {
            audioCtx.resume();
            nextStepTime = audioCtx.currentTime;
            e.target.innerText = "DETENER";
            e.target.classList.add('active');
            scheduler();
        } else {
            e.target.innerText = "ENCENDER MOTOR";
            e.target.classList.remove('active');
        }
    };

    tempoControl.oninput = (e) => document.getElementById('tempoDisplay').innerText = `${e.target.value} BPM`;

</script>
</body>
</html>
