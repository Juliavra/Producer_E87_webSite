<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galang</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: sans-serif;
        }

        /* Sección fija arriba */
        .busqueda {
            position: fixed;
            top: 0;
            width: 100%;
            height: 70px;
            /* Incrementado ligeramente para los inputs */
            background-color: #2c3e50;
            color: white;
            display: flex;
            align-items: center;
            padding: 0 15px;
            z-index: 1000;
            gap: 10px;
            /* Espacio entre los elementos de búsqueda */
            box-sizing: border-box;
        }

        .busqueda input,
        .busqueda select,
        .busqueda button {
            padding: 8px;
            font-size: 13px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }

        .busqueda button {
            background-color: #3498db;
            color: white;
            border: none;
            cursor: pointer;
            white-space: nowrap;
        }

        .busqueda button:hover {
            background-color: #2980b9;
        }

        /* Contenedor principal para lo que sigue debajo */
        .main-container {
            display: flex;
            margin-top: 70px;
            height: calc(100vh - 70px);
        }

        /* 1/3 a la izquierda */
        .query-result {
            flex: 1;
            background-color: #ecf0f1;
            padding: 20px;
            border-right: 1px solid #ccc;
            overflow-y: auto;
        }

        /* 2/3 a la derecha */
        .album-info {
            flex: 2;
            padding: 20px;
            overflow-y: auto;
        }

        /* Inputs específicos */
        .input-busqueda {
            flex: 1;
            /* Para que las cajas crezcan proporcionalmente */
            min-width: 100px;
        }
    </style>
</head>

<body>

    <header class="busqueda">
        <strong>Discogs</strong>
        <button onclick="buscar()">🔎 Buscar</button>
        <input type="text" id="myToken" class="input-busqueda" placeholder="Token...">
        <input type="text" id="artistSearch" class="input-busqueda" placeholder="Artista...">
        <input type="text" id="releaseSearch" class="input-busqueda" placeholder="Disco...">
        <input type="text" id="trackSearch" class="input-busqueda" placeholder="Canción...">
        <input type="text" id="labelSearch" class="input-busqueda" placeholder="Sello...">

        <select id="genreSearch">
            <option value="">Género...</option>

            <option value="Blues">Blues</option>
            <option value="Brass & Military">Brass & Military</option>
            <option value="Children's">Children's</option>
            <option value="Classical">Classical</option>
            <option value="Electronic">Electronic</option>
            <option value="Folk, World, & Country">Folk, World, & Country</option>
            <option value="Funk / Soul">Funk / Soul</option>
            <option value="Hip Hop">Hip Hop</option>
            <option value="Jazz">Jazz</option>
            <option value="Latin">Latin</option>
            <option value="Non-Music">Non-Music</option>
            <option value="Pop">Pop</option>
            <option value="Reggae">Reggae</option>
            <option value="Rock">Rock</option>
            <option value="Stage & Screen">Stage & Screen</option>
        </select>


        <select id="styleSearch">
            <option value="">Estilo...</option>
            <option value="Dancehall">Dancehall</option>
            <option value="Dub">Dub</option>
            <option value="Rocksteady">Rocksteady</option>
            <option value="Ska">Ska</option>
            <option value="Lovers rock">Lovers rock</option>
            <option value="Roots Reggae">Roots Reggae</option>
            <option value="Techno">Techno</option>
            <option value="House">House</option>
            <option value="Experimental">Experimental</option>
        </select>

        <input type="number" id="yearSelect" placeholder="Año" style="width: 60px;">

        
    </header>

    <main class="main-container">
        <aside class="query-result">
            <h3>Query Result</h3>
            <div id="resultsList">Lista de resultados aquí...</div>
        </aside>

        <section class="album-info">
            <h3>Información del Álbum</h3>
            <div id="container"></div>
            <div id="prints-data"></div>
        </section>
    </main>

    
    <script src="js/galang_API2.js"></script>

</body>

</html>
