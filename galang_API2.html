<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galang</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: sans-serif;
        }

        /* Sección fija arriba */
        .busqueda {
            position: fixed;
            top: 0;
            width: 100%;
            height: 70px;
            /* Incrementado ligeramente para los inputs */
            background-color: #2c3e50;
            color: white;
            display: flex;
            align-items: center;
            padding: 0 15px;
            z-index: 1000;
            gap: 10px;
            /* Espacio entre los elementos de búsqueda */
            box-sizing: border-box;
        }

        .busqueda input,
        .busqueda select,
        .busqueda button {
            padding: 8px;
            font-size: 13px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }

        .busqueda button {
            background-color: #3498db;
            color: white;
            border: none;
            cursor: pointer;
            white-space: nowrap;
        }

        .busqueda button:hover {
            background-color: #2980b9;
        }

        /* Contenedor principal para lo que sigue debajo */
        .main-container {
            display: flex;
            margin-top: 70px;
            height: calc(100vh - 70px);
        }

        /* 1/3 a la izquierda */
        .query-result {
            flex: 1;
            background-color: #ecf0f1;
            padding: 20px;
            border-right: 1px solid #ccc;
            overflow-y: auto;
        }

        /* 2/3 a la derecha */
        .album-info {
            flex: 2;
            padding: 20px;
            overflow-y: auto;
        }

        /* Inputs específicos */
        .input-busqueda {
            flex: 1;
            /* Para que las cajas crezcan proporcionalmente */
            min-width: 100px;
        }

        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #0066cc;
            /* Color principal */
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        #loadingText {
            font-family: sans-serif;
            color: #555;
            margin-top: 10px;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

<body>
    <header class="busqueda">
        <strong>Discogs #1</strong>
        <br>
        <button onclick="printErrorLog()">ErrorLog</button>
        <button onclick="buscar()">🔎 Buscar</button>
        <input type="text" id="myToken" class="input-busqueda" placeholder="Token...">
        <input type="text" id="query" class="input-busqueda" placeholder="Query...">
        <input type="radio" name="searchType" id="artistSearch" checked> <label for="artistSearch">Artist</label>
        <input type="radio" name="searchType" id="mastersSearch"> <label for="mastersSearch">Masters</label>
        <input type="radio" name="searchType" id="releaseSearch"> <label for="releaseSearch">Disco</label>
        <input type="radio" name="searchType" id="labelSearch"> <label for="labelSearch">Sello</label>
        <input type="checkbox" id="genreSearch"> <label for="genreSearch">Genre</label>
        <input type="checkbox" id="styleSearch"> <label for="styleSearch">Style</label>
        <input type="checkbox" id="yearSearch"> <label for="yearSearch">Year</label>
        <input type="checkbox" id="trackSearch"> <label for="trackSearch">Canción</label>
    </header>

    <main class="main-container">
        <aside class="query-result">
            <h3>Query Result</h3>
            <div id="loadingStatusSearch" style="display: none; text-align: center; margin: 20px;">
                <div class="spinner"></div>
                <p id="loadingTextSearch">Buscando en Discogs...</p>
            </div>
            <div class="storage-controls">
                <button id="btnSave" onclick="guardarBusquedaActual()">Guardar </button>
                <button id="btnShow" onclick="mostrarHistorial()">mostrar Historial</button>
                <button id="btnErase" onclick="limpiarHistorial()">Borrar </button>
                
                <br>
                <div id="exportSection">
                    <button onclick="exportarHistorialTXT()" style="background-color: #4CAF50; color: white;">
                        💾 Descargar Historial (.txt)
                    </button>
                </div>
            </div>
            <div id="resultsList"></div>

            <div id="paginationControls" class="hidden" style="margin-top: 20px; text-align: center;">
                <button id="prevBtn">Anterior</button>
                <span id="pageInfo"></span>
                <button id="nextBtn">Siguiente</button>
            </div>
        </aside>

        <section class="album-info">
            <div id="container"></div>
            <div id="containerReleases"></div>
        </section>
    </main>

    <script src="js/galang_API3.js"></script>

</body>

</html>
