<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>3D Space Engine - No Phase Mess</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a0a; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .unit { background: #151515; padding: 30px; border-radius: 20px; width: 400px; text-align: center; border: 1px solid #333; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        h2 { color: #00d4ff; letter-spacing: 2px; font-size: 1rem; margin-bottom: 25px; }
        #fileBtn { border: 2px dashed #444; padding: 30px; cursor: pointer; border-radius: 10px; color: #888; margin-bottom: 20px; transition: 0.3s; }
        #fileBtn:hover { border-color: #00d4ff; color: #fff; }
        .fader-group { background: #222; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        input[type="range"] { width: 100%; accent-color: #00d4ff; cursor: pointer; }
        .label-row { display: flex; justify-content: space-between; font-size: 0.7rem; margin-bottom: 10px; color: #00d4ff; font-weight: bold; }
        .power-btn { background: #00d4ff; color: #000; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .power-btn.on { background: #ff4b2b; color: white; }
    </style>
</head>
<body>

<div class="unit">
    <h2>BINAURAL SPATIAL ENGINE</h2>
    <div id="fileBtn">HACÉ CLIC PARA CARGAR AUDIO</div>
    <input type="file" id="audioInput" hidden accept="audio/*">

    <div class="fader-group">
        <div class="label-row"><span>ADELANTE (FRONT)</span><span id="frontVal">100%</span></div>
        <input type="range" id="frontGain" min="0" max="100" value="100">
        
        <div class="label-row" style="margin-top:20px;"><span>ATRÁS (REAR SPACE)</span><span id="rearVal">0%</span></div>
        <input type="range" id="rearGain" min="0" max="150" value="0">
    </div>

    <button id="btnPlay" class="power-btn">REPRODUCIR</button>
</div>

<script>
let audioCtx, source, buffer, isPlaying = false;
let frontNode, rearNode, frontGainNode, rearGainNode;

document.getElementById('fileBtn').onclick = () => document.getElementById('audioInput').click();

document.getElementById('audioInput').onchange = async (e) => {
    if(!e.target.files.length) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const ab = await e.target.files[0].arrayBuffer();
    buffer = await audioCtx.decodeAudioData(ab);
    document.getElementById('fileBtn').innerText = "AUDIO CARGADO ✓";
};

document.getElementById('btnPlay').onclick = () => {
    if(!buffer) return alert("Cargá un audio primero.");
    if(isPlaying) { location.reload(); return; }
    
    startSpatialEngine();
    isPlaying = true;
    document.getElementById('btnPlay').innerText = "DETENER";
    document.getElementById('btnPlay').classList.add('on');
};

function startSpatialEngine() {
    source = audioCtx.createBufferSource();
    source.buffer = buffer;
    source.loop = true;

    // 1. Nodos de Ganancia para controlar la mezcla
    frontGainNode = audioCtx.createGain();
    rearGainNode = audioCtx.createGain();

    // 2. Extraer señal de diferencia (L-R) para el "Atrás"
    // Esto quita la voz central y deja el ambiente
    const splitter = audioCtx.createChannelSplitter(2);
    const sideInverter = audioCtx.createGain();
    const sideSum = audioCtx.createGain();
    sideInverter.gain.value = -1;

    source.connect(splitter);
    splitter.connect(sideSum, 0); // L
    splitter.connect(sideInverter, 1); // R
    sideInverter.connect(sideSum); // L + (-R)

    // 3. SPATIAL PANNER - ADELANTE
    frontNode = audioCtx.createPanner();
    frontNode.panningModel = 'HRTF';
    frontNode.setPosition(0, 0, 2); // 2 metros al frente

    // 4. SPATIAL PANNER - ATRÁS
    rearNode = audioCtx.createPanner();
    rearNode.panningModel = 'HRTF';
    rearNode.setPosition(0, 0, -3); // 3 metros atrás

    // Filtro para el canal trasero (Muffled/Oclusión)
    const rearFilter = audioCtx.createBiquadFilter();
    rearFilter.type = "lowpass";
    rearFilter.frequency.value = 4000;

    // Conexiones Frontales
    source.connect(frontGainNode);
    frontGainNode.connect(frontNode);
    frontNode.connect(audioCtx.destination);

    // Conexiones Traseras
    sideSum.connect(rearFilter);
    rearFilter.connect(rearGainNode);
    rearGainNode.connect(rearNode);
    rearNode.connect(audioCtx.destination);

    source.start();
    updateLevels();
}

function updateLevels() {
    const fVal = document.getElementById('frontGain').value / 100;
    const rVal = document.getElementById('rearGain').value / 100;
    
    document.getElementById('frontVal').innerText = Math.round(fVal * 100) + "%";
    document.getElementById('rearVal').innerText = Math.round(rVal * 100) + "%";
    
    if(frontGainNode) frontGainNode.gain.setTargetAtTime(fVal, audioCtx.currentTime, 0.05);
    if(rearGainNode) rearGainNode.gain.setTargetAtTime(rVal, audioCtx.currentTime, 0.05);
}

document.getElementById('frontGain').oninput = updateLevels;
document.getElementById('rearGain').oninput = updateLevels;
</script>
</body>
</html>
