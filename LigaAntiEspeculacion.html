<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Liga Argentina - Gestión de Archivos</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 100%; max-width: 600px; margin-bottom: 20px; }
        .match-row { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 15px; }
        .team-input { flex: 1; display: flex; flex-direction: column; gap: 5px; }
        select, input { padding: 8px; border: 1px solid #ddd; border-radius: 6px; }
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        button { flex: 1; padding: 10px; cursor: pointer; border-radius: 6px; border: none; font-weight: bold; }
        .btn-add { background-color: #28a745; color: white; }
        .btn-save { background-color: #007bff; color: white; }
        .btn-load { background-color: #6c757d; color: white; position: relative; }
        #fileInput { display: none; }
        table { width: 100%; max-width: 800px; border-collapse: collapse; background: white; }
        th, td { padding: 10px; border-bottom: 1px solid #eee; text-align: center; }
        th { background: #343a40; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h2>Registrar Partido</h2>
    <div class="match-row">
        <div class="team-input">
            <select id="selectA" onchange="actualizarSelectB()"></select>
            <input type="number" id="golesA" value="0" min="0">
        </div>
        <span>VS</span>
        <div class="team-input">
            <select id="selectB"></select>
            <input type="number" id="golesB" value="0" min="0">
        </div>
    </div>
    <button class="btn-add" onclick="procesarPartido()">Cargar Resultado</button>

    <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
    
    <h3>Gestión de Datos</h3>
    <div class="btn-group">
        <button class="btn-save" onclick="guardarArchivo()">Guardar en TXT</button>
        <button class="btn-load" onclick="document.getElementById('fileInput').click()">Cargar desde TXT</button>
        <input type="file" id="fileInput" accept=".txt" onchange="leerArchivo(event)">
    </div>
</div>

<table>
    <thead>
        <tr><th>Equipo</th><th>PJ</th><th>PG</th><th>PE</th><th>PP</th><th>GF</th><th>GC</th><th>Pts</th></tr>
    </thead>
    <tbody id="cuerpoTabla"></tbody>
</table>

<script>
    class Equipo {
        constructor(nombre) {
            this.nombre = nombre;
            this.partidosJugados = 0;
            this.partidosGanados = 0;
            this.partidosEmpatados = 0;
            this.partidosPerdidos = 0;
            this.golesAFavor = 0;
            this.golesEnContra = 0;
            this.puntajeTotal = 0;
        }

        registrarPartido(gA, gR) {
            this.partidosJugados++;
            this.golesAFavor += gA;
            this.golesEnContra += gR;
            if (gA === gR) {
                this.partidosEmpatados++;
                this.puntajeTotal += (gA > 0) ? 1 : 0;
            } else if (gA > gR) {
                this.partidosGanados++;
                this.puntajeTotal += 3 + Math.min(gA - gR, 3);
            } else {
                this.partidosPerdidos++;
            }
        }
    }

    const nombres = ["Aldosivi", "Argentinos Juniors", "Atlético Tucumán", "Banfield", "Barracas Central", "Belgrano (Córdoba)", "Boca Juniors", "Central Córdoba (SdE)", "Defensa y Justicia", "Deportivo Riestra", "Estudiantes LP", "Gimnasia LP", "Godoy Cruz (Mendoza)", "Huracán", "Independiente", "Independiente Rivadavia", "Instituto (Córdoba)", "Lanús", "Newell's Old Boys", "Platense", "Racing Club", "River Plate", "Rosario Central", "San Lorenzo", "Sarmiento (Junín)", "Talleres (Córdoba)", "Tigre", "Unión (Santa Fe)", "Vélez Sarsfield"];
    let liga = nombres.map(n => new Equipo(n));

    // Lógica de UI
    function popularSelects() {
        const sA = document.getElementById('selectA');
        sA.innerHTML = '<option value="">Local...</option>';
        liga.forEach(e => sA.innerHTML += `<option value="${e.nombre}">${e.nombre}</option>`);
        actualizarSelectB();
    }

    function actualizarSelectB() {
        const sB = document.getElementById('selectB');
        const selA = document.getElementById('selectA').value;
        sB.innerHTML = '<option value="">Visitante...</option>';
        liga.filter(e => e.nombre !== selA).forEach(e => sB.innerHTML += `<option value="${e.nombre}">${e.nombre}</option>`);
    }

    function procesarPartido() {
        const nA = document.getElementById('selectA').value;
        const nB = document.getElementById('selectB').value;
        const gA = parseInt(document.getElementById('golesA').value);
        const gB = parseInt(document.getElementById('golesB').value);
        if (!nA || !nB) return alert("Selecciona equipos");
        
        liga.find(e => e.nombre === nA).registrarPartido(gA, gB);
        liga.find(e => e.nombre === nB).registrarPartido(gB, gA);
        actualizarTabla();
    }

    function actualizarTabla() {
        const cuerpo = document.getElementById('cuerpoTabla');
        cuerpo.innerHTML = '';
        [...liga].sort((a,b) => b.puntajeTotal - a.puntajeTotal).forEach(e => {
            cuerpo.innerHTML += `<tr><td>${e.nombre}</td><td>${e.partidosJugados}</td><td>${e.partidosGanados}</td><td>${e.partidosEmpatados}</td><td>${e.partidosPerdidos}</td><td>${e.golesAFavor}</td><td>${e.golesEnContra}</td><td><b>${e.puntajeTotal}</b></td></tr>`;
        });
    }

    // --- PERSISTENCIA EN ARCHIVOS ---

    function guardarArchivo() {
        const data = JSON.stringify(liga, null, 2);
        const blob = new Blob([data], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'liga_posiciones.txt';
        a.click();
        URL.revokeObjectURL(url);
    }

    function leerArchivo(event) {
        const archivo = event.target.files[0];
        if (!archivo) return;
        const lector = new FileReader();
        lector.onload = function(e) {
            try {
                const contenido = JSON.parse(e.target.result);
                // Re-instanciar objetos para recuperar los métodos de la clase Equipo
                liga = contenido.map(datos => {
                    const eq = new Equipo(datos.nombre);
                    Object.assign(eq, datos);
                    return eq;
                });
                actualizarTabla();
                popularSelects();
                alert("Datos cargados con éxito");
            } catch (err) {
                alert("Error al leer el archivo. Asegurate de que sea un TXT generado por esta app.");
            }
        };
        lector.readAsText(archivo);
    }

    popularSelects();
    actualizarTabla();
</script>
</body>
</html>
