<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MIDI Player - Controles</title>
    <script src="https://unpkg.com/tone"></script>
    <script src="https://unpkg.com/@tonejs/midi"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; padding-top: 50px; }
        .controls { margin-top: 20px; display: none; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; margin: 5px; border-radius: 5px; border: none; }
        .play { background: #28a745; color: white; }
        .stop { background: #dc3545; color: white; }
        #status { margin: 15px; color: #00d1b2; }
    </style>
</head>
<body>

    <h2>Reproductor MIDI</h2>
    <input type="file" id="midi-input" accept=".mid">
    <div id="status">Esperando archivo...</div>

    <div class="controls" id="player-controls">
        <button class="play" onclick="playMidi()">PLAY</button>
        <button class="stop" onclick="stopMidi()">STOP</button>
    </div>

    <script>
        const sampler = new Tone.Sampler({
            urls: { "A0": "A0.mp3", "C1": "C1.mp3", "A1": "A1.mp3", "C4": "C4.mp3" },
            baseUrl: "https://tonejs.github.io/audio/salamander/",
        }).toDestination();

        document.getElementById('midi-input').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            await Tone.start();
            document.getElementById('status').innerText = "Cargando partitura...";

            const reader = new FileReader();
            reader.onload = async (event) => {
                const midi = new Midi(event.target.result);
                
                // Limpiamos cualquier secuencia previa
                Tone.Transport.stop().cancel();

                // Programamos las notas en el transporte
                midi.tracks.forEach(track => {
                    track.notes.forEach(note => {
                        Tone.Transport.schedule((time) => {
                            sampler.triggerAttackRelease(note.name, note.duration, time, note.velocity);
                        }, note.time);
                    });
                });

                document.getElementById('status').innerText = "MIDI cargado: " + file.name;
                document.getElementById('player-controls').style.display = "block";
            };
            reader.readAsArrayBuffer(file);
        });

        function playMidi() {
            // Si el transporte ya está corriendo, lo reiniciamos
            if (Tone.Transport.state === 'started') {
                Tone.Transport.stop();
            }
            Tone.Transport.start();
            document.getElementById('status').innerText = "Reproduciendo...";
        }

        function stopMidi() {
            Tone.Transport.stop();
            document.getElementById('status').innerText = "Detenido.";
        }
    </script>
</body>
</html>
